<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크림(KREAM) 검색</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        .header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .controls .count {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            margin-left: 10px;
            display: none;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            color: white;
            margin-left: 10px;
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .table-container {
            max-height: 600px;
            overflow: auto;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .product-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 6px;
            background: #f8f9fa;
            padding: 3px;
        }
        .kream-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .kream-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 12px rgba(245, 87, 108, 0.35);
        }
        .sort-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #667eea;
            margin-left: 5px;
            padding: 2px 5px;
            transition: all 0.2s;
        }
        .sort-btn:hover {
            background: #667eea;
            color: white;
            border-radius: 3px;
        }
        .sort-btn.asc::after {
            content: ' ▲';
        }
        .sort-btn.desc::after {
            content: ' ▼';
        }
        
        /* 비교 열 기본 스타일 */
        td.comparison {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        td.comparison.profit-high {
            background-color: #e8f5e9;
        }

        tr:hover td.comparison {
            background-color: #e9ecef;
        }

        tr:hover td.comparison.profit-high {
            background-color: #d4edda;
        }
        
        /* 디버그 로그 패널 */
        .debug-panel {
            margin-top: 20px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
        }
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }
        .debug-title {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
        }
        .debug-log {
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        .debug-entry {
            margin-bottom: 5px;
            line-height: 1.5;
        }
        .debug-time {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 크림(KREAM) 검색</h1>
            <p>포이즌에서 수집한 상품을 크림에서 검색합니다</p>
        </div>

        <div class="controls">
            <div class="count">
                총 <strong id="totalCount">0</strong>개 상품
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="startKreamSearch()" id="searchBtn">
                    🔍 크림 검색 시작
                </button>
                <button class="btn btn-success" onclick="downloadKreamExcel()" id="excelBtn">
                    📊 엑셀 다운로드
                </button>
                <button class="btn btn-danger" onclick="closeKreamWindow()" id="closeBtn">
                    ❌ 창 닫기
                </button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th style="width: 80px;">이미지</th>
                        <th style="width: 100px;">크림</th>
                        <th style="width: 150px;">상품번호</th>
                        <th style="width: 300px;">제품명</th>
                        <th style="width: 120px;">평균거래가</th>
                        <th style="width: 120px;">중국노출가</th>
                        <th style="width: 100px;">
                            중국판매량
                            <button class="sort-btn" onclick="sortTable('중국판매량')" title="정렬">⇅</button>
                        </th>
                        <th style="width: 100px;">
                            현업자판매량
                            <button class="sort-btn" onclick="sortTable('현업자판매량')" title="정렬">⇅</button>
                        </th>
                        <th style="width: 120px;">크림평균가</th>
                        <th style="width: 100px;">
                            크림판매량
                            <button class="sort-btn" onclick="sortTable('크림판매량')" title="정렬">⇅</button>
                        </th>
                        <th style="width: 100px;">비교</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <tr>
                        <td colspan="12" style="text-align: center; padding: 40px; color: #999;">
                            ⏳ 데이터 로딩 중...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 디버그 로그 패널 -->
        <div class="debug-panel">
            <div class="debug-header">
                <div class="debug-title">🔍 디버그 로그 (실시간)</div>
                <label class="debug-toggle">
                    <input type="checkbox" id="showDebugToggle" onchange="toggleDebugView()" checked>
                    <span>로그 표시</span>
                </label>
            </div>
            <div id="debugLog" class="debug-log">
                <!-- 로그가 여기 추가됨 -->
            </div>
        </div>
    </div>

    <script>
        let collectedData = [];
        let currentSortColumn = null;
        let currentSortOrder = 'asc';
        let kreamSearchResults = [];  // ✅ 엑셀 저장용 데이터
        
        // ==========================================
        // 디버그 로그 함수
        // ==========================================
        function addDebugLog(message, color = '#0f0') {
            const logDiv = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'debug-entry';
            logEntry.innerHTML = `<span class="debug-time">[${time}]</span> <span style="color: ${color}">${message}</span>`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${time}] ${message}`);
        }
        
        function toggleDebugView() {
            const debugLog = document.getElementById('debugLog');
            const checkbox = document.getElementById('showDebugToggle');
            debugLog.style.display = checkbox.checked ? 'block' : 'none';
        }

        // ==========================================
        // 페이지 로드 및 데이터 불러오기
        // ==========================================
        window.addEventListener('load', function() {
            addDebugLog('🚀 크림 팝업 페이지 로드 시작', '#0ff');
            addDebugLog(`📍 URL: ${window.location.href}`);
            addDebugLog(`📍 Opener: ${window.opener ? 'O' : 'X'}`);
            
            const dataStr = sessionStorage.getItem('kreamSearchData');
            addDebugLog(`1️⃣ sessionStorage 확인...`);
            addDebugLog(`   ├─ 키 존재: ${!!dataStr}`, dataStr ? '#0f0' : '#f00');
            
            if (!dataStr) {
                addDebugLog(`   └─ ❌ sessionStorage에 kreamSearchData 없음!`, '#f00');
                addDebugLog(`🔍 전체 키 목록: ${JSON.stringify(Object.keys(sessionStorage))}`, '#ff0');
                
                if (window.opener && window.opener.collectedData) {
                    addDebugLog(`2️⃣ opener에서 데이터 가져오기 시도...`, '#ff0');
                    try {
                        collectedData = window.opener.collectedData;
                        addDebugLog(`   ├─ ✅ opener에서 데이터 가져옴!`, '#0f0');
                        addDebugLog(`   └─ 상품 개수: ${collectedData.length}`, '#0ff');
                        
                        sessionStorage.setItem('kreamSearchData', JSON.stringify(collectedData));
                        addDebugLog(`   └─ sessionStorage에 저장 완료`, '#0f0');
                        
                        displayProducts(collectedData);
                        addDebugLog(`✅ 전체 로딩 완료!`, '#0f0');
                        
                    } catch (e) {
                        addDebugLog(`   ❌ opener 접근 오류: ${e.message}`, '#f00');
                        showNoDataMessage();
                    }
                } else {
                    addDebugLog(`❌ opener도 없고 sessionStorage도 없음`, '#f00');
                    showNoDataMessage();
                }
                return;
            }
            
            addDebugLog(`   ├─ 데이터 크기: ${dataStr.length} bytes`, '#0ff');
            addDebugLog(`   └─ 미리보기: ${dataStr.substring(0, 80)}...`, '#888');
            
            try {
                addDebugLog('2️⃣ JSON 파싱 시도...', '#ff0');
                collectedData = JSON.parse(dataStr);
                addDebugLog(`   ├─ ✅ 파싱 성공!`, '#0f0');
                addDebugLog(`   ├─ 상품 개수: ${collectedData.length}`, '#0ff');
                
                if (collectedData.length > 0) {
                    const first = collectedData[0];
                    addDebugLog(`   ├─ 첫 상품번호: ${first?.상품번호}`, '#0ff');
                    addDebugLog(`   └─ 첫 제품명: ${first?.제품명?.substring(0, 30)}...`, '#0ff');
                }
                
                addDebugLog('3️⃣ 테이블 렌더링...', '#ff0');
                displayProducts(collectedData);
                
                const tbody = document.getElementById('productTableBody');
                const rows = tbody.querySelectorAll('tr').length;
                addDebugLog(`   └─ ✅ 테이블에 ${rows}행 생성됨`, '#0f0');
                
                addDebugLog('✅ 전체 로딩 완료!', '#0f0');
                
            } catch (e) {
                addDebugLog(`❌ 파싱 오류: ${e.message}`, '#f00');
                addDebugLog(`   Stack: ${e.stack?.substring(0, 200)}`, '#f00');
                console.error('데이터 파싱 오류:', e);
                showNoDataMessage();
            }
        });
        
        function showNoDataMessage() {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="12" style="text-align: center; padding: 50px;">
                        <div style="font-size: 48px; margin-bottom: 15px;">⚠️</div>
                        <div style="font-size: 18px; font-weight: 600; color: #dc3545; margin-bottom: 10px;">
                            데이터가 없습니다
                        </div>
                        <div style="font-size: 14px; color: #666;">
                            메인 창에서 먼저 키워드 검색을 실행하세요
                        </div>
                    </td>
                </tr>
            `;
        }

        // ==========================================
        // 테이블에 상품 데이터 표시
        // ==========================================
        function displayProducts(data) {
            const tbody = document.getElementById('productTableBody');
            const totalCount = document.getElementById('totalCount');
            
            addDebugLog(`📋 displayProducts() 호출: ${data.length}개`, '#0ff');
            
            totalCount.textContent = data.length;
            
            if (data.length === 0) {
                showNoDataMessage();
                return;
            }
            
            // ✅ 엑셀 저장용 데이터 초기화 (모든 값을 문자열로 변환)
            kreamSearchResults = data.map((item, index) => ({
                순번: String(index + 1),
                상품번호: String(item.상품번호 || '-'),
                제품명: String(item.제품명 || '-'),
                평균거래가: String(item.최근30일평균거래가 || '-'),
                중국노출가: String(item.중국노출 || '-'),
                중국판매량: String(item.중국시장최근30일판매량 || 0),
                현업자판매량: String(item.현지판매자최근30일판매량 || 0),
                크림평균가: '-',
                크림판매량: '-',
                비교: '-'
            }));
            
            tbody.innerHTML = data.map((item, index) => {
                if (index < 3) {
                    addDebugLog(`   행 #${index+1}: ${item.상품번호}`, '#888');
                }
                
                return `
                <tr id="row-${index}" data-index="${index}">
                    <td>${index + 1}</td>
                    <td>
                        ${item.이미지URL ? 
                            `<img src="${item.이미지URL}" class="product-img" onerror="this.style.display='none'">` : 
                            '-'}
                    </td>
                    <td>
                        <button class="kream-btn" disabled style="opacity: 0.5; cursor: not-allowed;" title="전체 검색 버튼을 사용하세요">
                            🔍 검색
                        </button>
                    </td>
                    <td>${item.상품번호 || '-'}</td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;" title="${item.제품명 || '-'}">
                        ${item.제품명 || '-'}
                    </td>
                    <td>${item.최근30일평균거래가 || '-'}</td>
                    <td class="cn-price" id="cn-price-${index}">${item.중국노출 || '-'}</td>
                    <td data-sales="${item.중국시장최근30일판매량 || 0}">
                        ${item.중국시장최근30일판매량 ? item.중국시장최근30일판매량.toLocaleString() + '개' : '0개'}
                    </td>
                    <td data-local-sales="${item.현지판매자최근30일판매량 || 0}">
                        ${item.현지판매자최근30일판매량 ? item.현지판매자최근30일판매량.toLocaleString() + '개' : '0개'}
                    </td>
                    <td class="kream-avg-price" id="kream-avg-${index}">-</td>
                    <td class="kream-sales" id="kream-sales-${index}" data-kream-sales="0">-</td>
                    <td class="comparison" id="comparison-${index}" style="font-weight: 600;">-</td>
                </tr>
                `;
            }).join('');
            
            addDebugLog(`   ✅ ${data.length}행 생성 완료`, '#0f0');
            window.collectedData = data;
        }

        // ==========================================
        // 크림 검색 시작
        // ==========================================
        async function startKreamSearch() {
            if (collectedData.length === 0) {
                alert('검색할 상품이 없습니다.');
                return;
            }
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '검색 준비 중...';
            
            addDebugLog('🔍 크림 검색 시작', '#0ff');
            
            try {
                const productCodes = collectedData
                    .map(item => item.상품번호)
                    .filter(code => code && code !== '-');
                
                addDebugLog(`📦 검색할 상품: ${productCodes.length}개`, '#0ff');
                
                const response = await fetch('/start_kream_search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        product_codes: productCodes,
                        total_count: collectedData.length
                    })
                });
                
                const result = await response.json();
                
                if (!result.success) {
                    addDebugLog(`❌ 요청 실패: ${result.error}`, '#f00');
                    alert('검색 시작 실패: ' + result.error);
                    btn.disabled = false;
                    btn.textContent = '🔍 크림 검색 시작';
                    return;
                }
                
                addDebugLog(`✅ 백그라운드 검색 시작`, '#0f0');
                btn.textContent = '🔄 검색 중...';
                
                startProgressStream(result.task_id);
                
            } catch (error) {
                addDebugLog(`❌ 오류: ${error.message}`, '#f00');
                btn.disabled = false;
                btn.textContent = '🔍 크림 검색 시작';
            }
        }

        // ==========================================
        // SSE 스트림으로 실시간 진행 상황 받기
        // ==========================================
        function startProgressStream(taskId) {
            addDebugLog('📡 진행 상황 스트림 연결 중...', '#0ff');
            
            const eventSource = new EventSource(`/kream_search_progress/${taskId}`);
            
            eventSource.addEventListener('progress', function(e) {
                const data = JSON.parse(e.data);
                addDebugLog(`📊 ${data.current}/${data.total}: ${data.product_code}`, '#0ff');
            });
            
            eventSource.addEventListener('result', function(e) {
                const data = JSON.parse(e.data);
                addDebugLog(`✅ #${data.index + 1} 완료`, '#0f0');
                updateRowResult(data.index, data.result);
            });
            
            eventSource.addEventListener('complete', function(e) {
                const data = JSON.parse(e.data);
                addDebugLog(`🎉 전체 검색 완료!`, '#0f0');
                eventSource.close();
                
                const btn = document.getElementById('searchBtn');
                btn.disabled = false;
                btn.textContent = '✅ 검색 완료';
                
                // ✅ 엑셀 다운로드 버튼 표시
                document.getElementById('excelBtn').style.display = 'block';
                addDebugLog(`📊 엑셀 다운로드 버튼 활성화`, '#0f0');
            });
            
            eventSource.addEventListener('error', function(e) {
                addDebugLog(`❌ SSE 오류`, '#f00');
                eventSource.close();
                
                const btn = document.getElementById('searchBtn');
                btn.disabled = false;
                btn.textContent = '🔍 크림 검색 시작';
            });
        }

        // ==========================================
        // 테이블 행에 검색 결과 표시 (크림 평균가, 판매량)
        // ==========================================
        function updateRowResult(index, result) {
            addDebugLog(`📝 행 #${index + 1} 결과 업데이트 중...`, '#0ff');
            
            if (!result.success) {
                addDebugLog(`   ❌ 검색 실패`, '#f00');
                return;
            }
            
            if (!result.kream_data) {
                addDebugLog(`   ⚠️ kream_data 없음`, '#ff0');
                return;
            }
            
            addDebugLog(`   ✅ 크림 데이터 수신`, '#0f0');
            
            // 1. 크림 평균가 업데이트
            const avgPriceEl = document.getElementById(`kream-avg-${index}`);
            let kreamPrice = 0;
            
            if (avgPriceEl && result.kream_data.avg_price) {
                avgPriceEl.textContent = result.kream_data.avg_price;
                avgPriceEl.style.fontWeight = '600';
                avgPriceEl.style.color = '#667eea';
                
                const priceStr = result.kream_data.avg_price.replace(/[₩,원\s]/g, '');
                kreamPrice = parseInt(priceStr) || 0;
                
                // ✅ 엑셀 데이터 업데이트 (문자열로 저장)
                if (kreamSearchResults[index]) {
                    kreamSearchResults[index].크림평균가 = String(result.kream_data.avg_price);
                }
                
                addDebugLog(`   → 크림평균가: ${result.kream_data.avg_price}`, '#0f0');
            }
            
            // 2. 크림 판매량 업데이트
            const salesEl = document.getElementById(`kream-sales-${index}`);
            if (salesEl && result.kream_data.sales) {
                let salesNum = 0;
                if (typeof result.kream_data.sales === 'string') {
                    salesNum = parseInt(result.kream_data.sales.replace(/[^0-9]/g, '')) || 0;
                } else {
                    salesNum = parseInt(result.kream_data.sales) || 0;
                }
                
                salesEl.textContent = salesNum.toLocaleString() + '개';
                salesEl.style.fontWeight = '600';
                salesEl.style.color = '#667eea';
                salesEl.setAttribute('data-kream-sales', salesNum);
                
                // ✅ 엑셀 데이터 업데이트 (문자열로 저장)
                if (kreamSearchResults[index]) {
                    kreamSearchResults[index].크림판매량 = String(result.kream_data.sales);
                }
                
                addDebugLog(`   → 크림판매량: ${salesNum.toLocaleString()}개`, '#0f0');
            }
            
            // 3. 가격 비교 계산
            const cnPriceEl = document.getElementById(`cn-price-${index}`);
            const comparisonEl = document.getElementById(`comparison-${index}`);

            if (cnPriceEl && comparisonEl && kreamPrice > 0) {
                const cnPriceText = cnPriceEl.textContent;
                const cnPriceStr = cnPriceText.replace(/[₩,원\s]/g, '');
                const cnPrice = parseInt(cnPriceStr) || 0;
                
                if (cnPrice > 0) {
                    const diff = cnPrice - kreamPrice;
                    const diffFormatted = Math.abs(diff).toLocaleString();
                    
                    comparisonEl.className = 'comparison';
                    
                    let comparisonText = '';
                    if (diff > 0) {
                        comparisonText = `+₩${diffFormatted}`;
                        comparisonEl.textContent = comparisonText;
                        comparisonEl.style.color = '#4CAF50';
                        comparisonEl.title = '중국이 더 비쌈 (유리)';
                        
                        if (diff >= 10000) {
                            comparisonEl.className = 'comparison profit-high';
                            addDebugLog(`   → 비교: ${comparisonText} (10,000원 이상!)`, '#0f0');
                        } else {
                            addDebugLog(`   → 비교: ${comparisonText}`, '#0ff');
                        }
                        
                    } else if (diff < 0) {
                        comparisonText = `-₩${diffFormatted}`;
                        comparisonEl.textContent = comparisonText;
                        comparisonEl.style.color = '#f44336';
                        comparisonEl.title = '크림이 더 비쌈 (불리)';
                        addDebugLog(`   → 비교: ${comparisonText}`, '#ff0');
                    } else {
                        comparisonText = '₩0';
                        comparisonEl.textContent = comparisonText;
                        comparisonEl.style.color = '#666';
                        comparisonEl.title = '가격 동일';
                        addDebugLog(`   → 비교: ${comparisonText}`, '#0ff');
                    }
                    
                    // ✅ 엑셀 데이터 업데이트 (문자열로 저장)
                    if (kreamSearchResults[index]) {
                        kreamSearchResults[index].비교 = String(comparisonText);
                    }
                }
            }
            
            addDebugLog(`   ✅ 행 #${index + 1} 업데이트 완료`, '#0f0');
        }

        // ==========================================
        // ✨ 엑셀 다운로드 함수
        // ==========================================
        async function downloadKreamExcel() {
            try {
                addDebugLog('📊 엑셀 파일 생성 중...', '#0ff');
                
                // 빈 데이터 제거
                const validData = kreamSearchResults.filter(item => item != null);
                
                if (validData.length === 0) {
                    alert('❌ 다운로드할 데이터가 없습니다');
                    return;
                }
                
                addDebugLog(`   → 총 ${validData.length}개 데이터`, '#0ff');
                
                // 서버에 POST 요청
                const response = await fetch('/export_kream_to_excel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        data: validData
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    addDebugLog(`✅ 엑셀 파일 생성 완료: ${result.filename}`, '#0f0');
                    addDebugLog(`   → ${result.count}개 상품 저장됨`, '#0f0');
                    
                    // 새 창으로 다운로드 (브라우저 차단 방지)
                    const downloadUrl = `/download_kream/${result.filename}`;
                    window.location.href = downloadUrl;
                    
                    addDebugLog('📥 다운로드 시작!', '#0f0');
                    
                    // 1초 후 알림
                    setTimeout(() => {
                        alert(`✅ 엑셀 다운로드 완료!\n\n파일: ${result.filename}\n상품: ${result.count}개`);
                    }, 500);
                } else {
                    alert('❌ 엑셀 생성 실패: ' + result.error);
                    addDebugLog('❌ 엑셀 생성 실패: ' + result.error, '#f00');
                }
                
            } catch (error) {
                console.error('엑셀 다운로드 오류:', error);
                alert('❌ 엑셀 다운로드 오류: ' + error);
                addDebugLog('❌ 엑셀 다운로드 오류: ' + error, '#f00');
            }
        }

        // ==========================================
        // 정렬 함수
        // ==========================================
        function sortTable(column) {
            addDebugLog(`🔄 정렬: ${column}`, '#0ff');
            
            if (currentSortColumn === column) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortColumn = column;
                currentSortOrder = 'asc';
            }
            
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.className = 'sort-btn';
            });
            
            const activeBtn = event.target;
            activeBtn.className = `sort-btn ${currentSortOrder}`;
            
            const tbody = document.getElementById('productTableBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            rows.sort((rowA, rowB) => {
                let aVal = 0, bVal = 0;
                
                switch(column) {
                    case '중국판매량':
                        aVal = parseInt(rowA.cells[7].getAttribute('data-sales')) || 0;
                        bVal = parseInt(rowB.cells[7].getAttribute('data-sales')) || 0;
                        break;
                    
                    case '현업자판매량':
                        aVal = parseInt(rowA.cells[8].getAttribute('data-local-sales')) || 0;
                        bVal = parseInt(rowB.cells[8].getAttribute('data-local-sales')) || 0;
                        break;
                    
                    case '크림판매량':
                        aVal = parseInt(rowA.cells[10].getAttribute('data-kream-sales')) || 0;
                        bVal = parseInt(rowB.cells[10].getAttribute('data-kream-sales')) || 0;
                        break;
                    
                    default:
                        return 0;
                }
                
                return currentSortOrder === 'asc' ? aVal - bVal : bVal - aVal;
            });
            
            rows.forEach((row, index) => {
                row.cells[0].textContent = index + 1;
                tbody.appendChild(row);
            });
            
            addDebugLog(`   ✅ 정렬 완료: ${currentSortOrder === 'asc' ? '오름차순 ▲' : '내림차순 ▼'}`, '#0f0');
        }

        // ==========================================
        // 창 닫기
        // ==========================================
        function closeKreamWindow() {
            addDebugLog('🛑 창 닫기 요청...', '#ff0');
            
            if (confirm('작업을 중단하고 창을 닫으시겠습니까?\n\n백그라운드 검색도 중단됩니다.')) {
                addDebugLog('✅ 사용자 확인 완료', '#0f0');
                
                fetch('/stop_kream_search', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => addDebugLog(`✅ 중단 요청 완료`, '#0f0'))
                    .catch(error => addDebugLog(`⚠️ 중단 요청 실패`, '#ff0'));
                
                setTimeout(() => {
                    addDebugLog('👋 창을 닫습니다...', '#0f0');
                    window.close();
                }, 1000);
            } else {
                addDebugLog('❌ 사용자가 취소함', '#888');
            }
        }
    </script>
</body>
