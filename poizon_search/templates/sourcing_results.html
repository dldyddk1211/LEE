<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매처 검색 결과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .status {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .status-searching {
            background: #ffc107;
            color: #000;
        }

        .status-complete {
            background: #28a745;
            color: white;
        }

        .status-error {
            background: #dc3545;
            color: white;
        }

        .progress-container {
            padding: 20px 30px;
            background: #fff;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .results-container {
            padding: 30px;
        }

        .product-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        .product-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-code {
            font-size: 20px;
            font-weight: bold;
        }

        .product-status {
            padding: 5px 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            font-size: 14px;
        }

        .product-items {
            padding: 20px;
        }

        .item-row {
            display: grid;
            grid-template-columns: 80px 150px 1fr 120px 100px 150px;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            align-items: center;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-row:hover {
            background: #f8f9fa;
        }

        .item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }

        .item-mall {
            font-weight: bold;
            color: #667eea;
        }

        .item-name {
            color: #333;
            line-height: 1.4;
        }

        .item-price {
            font-size: 18px;
            font-weight: bold;
            color: #dc3545;
        }

        .item-shipping {
            color: #28a745;
            font-size: 14px;
        }

        .item-link {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .item-link:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 16px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .log-container {
            padding: 20px 30px;
            background: #f8f9fa;
            max-height: 200px;
            overflow-y: auto;
            border-top: 3px solid #667eea;
        }

        .log-item {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .log-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .log-success {
            background: #d4edda;
            color: #155724;
        }

        .log-warning {
            background: #fff3cd;
            color: #856404;
        }

        .log-error {
            background: #f8d7da;
            color: #721c24;
        }

        .footer {
            padding: 20px 30px;
            text-align: center;
            background: #f8f9fa;
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 구매처 검색 결과</h1>
            <p>네이버 쇼핑 실시간 검색</p>
        </div>

        <div class="status">
            <div class="status-item">
                <span>상태:</span>
                <span class="status-badge status-searching" id="statusBadge">
                    <span class="loading-spinner"></span> 검색 중...
                </span>
            </div>
            <div class="status-item">
                <span>진행:</span>
                <strong id="progressText">0/0</strong>
            </div>
            <div class="status-item">
                <span>검색 시작:</span>
                <strong id="startTime">-</strong>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="no-results">
                <p>🔍 검색을 시작합니다...</p>
            </div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="log-item log-info">시스템 준비 완료</div>
        </div>

        <div class="footer">
            © 2026 POIZON 구매처 검색 시스템
        </div>
    </div>

    <script>
        const eventSource = new EventSource(window.location.pathname.replace('/sourcing_results/', '/start_sourcing_stream/'));
        const resultsContainer = document.getElementById('resultsContainer');
        const logContainer = document.getElementById('logContainer');
        const statusBadge = document.getElementById('statusBadge');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const startTime = document.getElementById('startTime');

        let results = {};
        let totalProducts = 0;
        let currentProduct = 0;

        // 시작 시간 표시
        startTime.textContent = new Date().toLocaleTimeString('ko-KR');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === 'log') {
                addLog(data.message, data.level || 'info');
            }
            else if (data.type === 'progress') {
                updateProgress(data.current, data.total);
            }
            else if (data.type === 'product_start') {
                addProductCard(data.product_code);
            }
            else if (data.type === 'product_result') {
                updateProductCard(data.product_code, data.products);
            }
            else if (data.type === 'complete') {
                completeSearch();
            }
            else if (data.type === 'error') {
                showError(data.message);
            }
        };

        function addLog(message, level) {
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${level}`;
            logItem.textContent = `[${new Date().toLocaleTimeString('ko-KR')}] ${message}`;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateProgress(current, total) {
            currentProduct = current;
            totalProducts = total;
            
            const percentage = Math.round((current / total) * 100);
            progressText.textContent = `${current}/${total}`;
            progressFill.style.width = `${percentage}%`;
            progressFill.textContent = `${percentage}%`;
        }

        function addProductCard(productCode) {
            if (resultsContainer.querySelector('.no-results')) {
                resultsContainer.innerHTML = '';
            }

            const card = document.createElement('div');
            card.className = 'product-card';
            card.id = `product-${productCode}`;
            card.innerHTML = `
                <div class="product-header">
                    <span class="product-code">${productCode}</span>
                    <span class="product-status">
                        <span class="loading-spinner"></span> 검색 중...
                    </span>
                </div>
                <div class="product-items">
                    <div class="no-results">
                        <p>🔍 상품 정보를 검색하고 있습니다...</p>
                    </div>
                </div>
            `;
            resultsContainer.appendChild(card);
        }

        function updateProductCard(productCode, products) {
            const card = document.getElementById(`product-${productCode}`);
            if (!card) return;

            const header = card.querySelector('.product-header');
            const itemsContainer = card.querySelector('.product-items');

            if (products && products.length > 0) {
                header.querySelector('.product-status').innerHTML = `✅ ${products.length}개 발견`;
                
                itemsContainer.innerHTML = products.map(product => `
                    <div class="item-row">
                        <img src="${product.image_url || '/static/no-image.png'}" 
                             alt="상품 이미지" 
                             class="item-image"
                             onerror="this.src='/static/no-image.png'">
                        <div class="item-mall">${product.mall || '알 수 없음'}</div>
                        <div class="item-name">${product.name || '상품명 없음'}</div>
                        <div class="item-price">${product.price || '-'}원</div>
                        <div class="item-shipping">${product.shipping || '무료배송'}</div>
                        <a href="${product.link}" target="_blank" class="item-link">
                            상세보기 →
                        </a>
                    </div>
                `).join('');
            } else {
                header.querySelector('.product-status').innerHTML = '❌ 결과 없음';
                itemsContainer.innerHTML = `
                    <div class="no-results">
                        <p>😢 검색 결과가 없습니다</p>
                    </div>
                `;
            }
        }

        function completeSearch() {
            statusBadge.className = 'status-badge status-complete';
            statusBadge.innerHTML = '✅ 검색 완료';
            addLog('모든 상품 검색이 완료되었습니다!', 'success');
            eventSource.close();
        }

        function showError(message) {
            statusBadge.className = 'status-badge status-error';
            statusBadge.innerHTML = '❌ 오류 발생';
            addLog(`오류: ${message}`, 'error');
            eventSource.close();
        }

        eventSource.onerror = function() {
            if (statusBadge.className.includes('status-searching')) {
                showError('서버 연결이 끊어졌습니다');
            }
        };
    </script>
</body>
</html>
