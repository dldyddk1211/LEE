<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서식 / 양식</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 16px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .header a { color: #aaa; text-decoration: none; font-size: 14px; }
  .header a:hover { color: #fff; }
  .header h1 { color: #fff; font-size: 20px; font-weight: 700; }
  .header-sep { color: #555; }
  .container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
  .card-header { background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #fff; padding: 14px 18px; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
  .card-body { padding: 16px; }
  .search-box { position: relative; margin-bottom: 12px; }
  .search-box input { width: 100%; padding: 10px 36px 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
  .search-box input:focus { border-color: #0f3460; }
  .search-box .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #999; }
  .customer-list { max-height: 260px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
  .customer-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
  .customer-item:last-child { border-bottom: none; }
  .customer-item:hover { background: #f0f4ff; }
  .customer-item.selected { background: #e8f0fe; border-left: 3px solid #0f3460; }
  .customer-name { font-weight: 600; font-size: 13px; color: #1a1a2e; }
  .customer-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .del-btn { color: #ff4444; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .del-btn:hover { background: #ffe0e0; }
  .btn-full { width: 100%; margin-top: 10px; padding: 9px; background: linear-gradient(135deg, #0f3460, #1a1a2e); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-full:hover { opacity: 0.85; }
  .main-area { display: flex; flex-direction: column; gap: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.span2 { grid-column: span 2; }
  .form-group.span3 { grid-column: span 3; }
  label { font-size: 11px; font-weight: 600; color: #666; }
  input[type="text"], input[type="date"], input[type="number"] { padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; font-family: inherit; width: 100%; }
  input:focus { border-color: #0f3460; }
  input[readonly] { background: #f8f9fa; color: #666; }
  .product-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .product-table th { background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #fff; padding: 8px 6px; text-align: center; font-size: 12px; }
  .product-table td { border: 1px solid #eee; padding: 4px; }
  .product-table td input { width: 100%; border: none; padding: 6px 4px; font-size: 12px; text-align: center; outline: none; background: transparent; font-family: inherit; }
  .product-table td input:focus { background: #f0f4ff; }
  .calc-cell { background: #f8f9fa; color: #333; text-align: center; padding: 6px 4px !important; font-size: 12px; }
  .btn-add-row { margin-top: 8px; padding: 7px 14px; background: #f0f4ff; color: #0f3460; border: 1.5px dashed #0f3460; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .btn-add-row:hover { background: #e0e8ff; }
  .summary-box { background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #fff; border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .summary-item { text-align: center; }
  .summary-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
  .summary-value { font-size: 18px; font-weight: 700; }
  .summary-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.2); }
  .payment-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .action-bar { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-outline { padding: 11px 28px; background: #fff; color: #0f3460; border: 2px solid #0f3460; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-outline:hover { background: #f0f4ff; }
  .btn-primary { padding: 11px 28px; background: linear-gradient(135deg, #0f3460, #1a1a2e); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 24px; color: #aaa; font-size: 13px; }

  /* 공급자 카드 */
  .supplier-info { font-size: 12px; color: #444; line-height: 1.9; }
  .supplier-info div { display: flex; gap: 6px; }
  .supplier-info strong { color: #1a1a2e; min-width: 60px; flex-shrink: 0; }
  .supplier-bank { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; font-size: 12px; color: #444; }
  .supplier-bank strong { color: #1a1a2e; }
  /* 수정됨 배지 */
  .modified-badge { display: inline-block; background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 8px; }
  /* 카드 헤더 수정 버튼 */
  .btn-header-edit { padding: 4px 12px; background: rgba(255,255,255,0.18); color: #fff; border: 1px solid rgba(255,255,255,0.45); border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .btn-header-edit:hover { background: rgba(255,255,255,0.32); }

  /* 모달 공통 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal-lg { background: #fff; border-radius: 14px; width: 92vw; max-width: 900px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .modal-sm { background: #fff; border-radius: 14px; width: 92vw; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .modal-header { background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #fff; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 14px 14px 0 0; }
  .modal-header h3 { font-size: 15px; }
  .modal-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-body { padding: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid2 .span2 { grid-column: span 2; }
  .modal-note { font-size: 11px; color: #999; margin-bottom: 14px; padding: 8px 12px; background: #f8f9fa; border-radius: 6px; border-left: 3px solid #0f3460; }

  /* 미리보기 */
  .invoice-preview { border: 2px solid #333; font-size: 12px; }
  .inv-title { text-align: center; font-size: 26px; font-weight: 900; padding: 16px; border-bottom: 2px solid #333; letter-spacing: 8px; }
  .inv-date-row { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #333; }
  .inv-date-cell { padding: 7px 12px; font-weight: 700; border-right: 1px solid #333; font-size: 12px; }
  .inv-date-cell:last-child { border-right: none; font-weight: 400; color: #666; }
  .inv-parties { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #333; }
  .inv-party { border-right: 1px solid #333; }
  .inv-party:last-child { border-right: none; }
  .inv-party-header { background: #f0f0f0; text-align: center; font-weight: 700; padding: 5px; border-bottom: 1px solid #333; }
  .inv-party-row { display: grid; grid-template-columns: 80px 1fr; border-bottom: 1px solid #eee; }
  .inv-party-row:last-child { border-bottom: none; }
  .inv-lbl { background: #fafafa; font-weight: 700; padding: 5px 8px; border-right: 1px solid #eee; font-size: 11px; display: flex; align-items: center; }
  .inv-val { padding: 5px 8px; font-size: 11px; }
  .inv-total-row { display: grid; grid-template-columns: 110px 1fr 110px 1fr; border-bottom: 1px solid #333; border-top: 1px solid #333; }
  .inv-tlbl { background: #f0f0f0; font-weight: 700; padding: 9px 8px; border-right: 1px solid #333; text-align: center; font-size: 12px; }
  .inv-tval { padding: 9px 12px; font-size: 15px; font-weight: 700; color: #0f3460; border-right: 1px solid #333; }
  .inv-tsub { padding: 9px 12px; font-size: 12px; }
  .inv-products table { width: 100%; border-collapse: collapse; }
  .inv-products th { background: #1a1a2e; color: #fff; padding: 6px 4px; text-align: center; font-size: 11px; border: 1px solid #333; }
  .inv-products td { border: 1px solid #ddd; padding: 5px 4px; text-align: center; font-size: 11px; }
  .inv-bank { padding: 5px 12px; border-top: 1px solid #333; border-bottom: 1px solid #333; font-size: 11px; color: #555; }
  .inv-totals { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #333; }
  .inv-tot-cell { padding: 5px 12px; border-right: 1px solid #333; font-size: 11px; }
  .inv-tot-cell:last-child { border-right: none; }
  .inv-footer { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #333; }
  .inv-foot-cell { padding: 7px 12px; border-right: 1px solid #333; font-size: 11px; }
  .inv-foot-cell:last-child { border-right: none; }

  /* 빨간 취소 버튼 */
  .btn-danger { padding: 9px 18px; background: #fff; color: #e74c3c; border: 2px solid #e74c3c; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-danger:hover { background: #fff5f5; }

  @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="header">
  <a href="/">← 메인</a>
  <span class="header-sep">|</span>
  <h1>📋 서식 / 양식</h1>
</div>

<div class="container">

  <!-- ── 왼쪽 사이드바 ── -->
  <div style="display:flex;flex-direction:column;gap:14px;">

    <!-- 고객 목록 -->
    <div class="card">
      <div class="card-header">
        <span>👥 고객 목록</span>
      </div>
      <div class="card-body">
        <div class="search-box">
          <input type="text" id="customerSearch" placeholder="업체명 / 이름 검색..." oninput="searchCustomers()">
          <span class="search-icon">🔍</span>
        </div>
        <div class="customer-list" id="customerList">
          <div class="empty-state">고객을 추가해주세요</div>
        </div>
        <button class="btn-full" onclick="openAddCustomer()">➕ 새 고객 추가</button>
      </div>
    </div>

    <!-- 공급자 정보 -->
    <div class="card">
      <div class="card-header">
        <span>🏢 공급자 정보</span>
        <button class="btn-header-edit" onclick="openEditSupplier()">✏️ 수정</button>
      </div>
      <div class="card-body">
        <div id="supplierDisplay"></div>
      </div>
    </div>

  </div>

  <!-- ── 오른쪽 메인 ── -->
  <div class="main-area">

    <!-- 거래 기본 정보 -->
    <div class="card">
      <div class="card-body">
        <div class="section-title">📅 거래 기본 정보</div>
        <div class="form-grid">
          <div class="form-group"><label>거래일자</label><input type="date" id="tradeDate"></div>
          <div class="form-group span2"><label>메모 (선택)</label><input type="text" id="tradeMemo" placeholder="예: 2월 정기 거래"></div>
        </div>
      </div>
    </div>

    <!-- 수요자 정보 -->
    <div class="card">
      <div class="card-body">
        <div class="section-title">🏪 수요자 정보 <span style="font-size:11px;color:#999;font-weight:400;">← 고객 목록에서 선택하거나 직접 입력</span></div>
        <div class="form-grid">
          <div class="form-group"><label>사업자번호</label><input type="text" id="buyerBizNo" placeholder="000-00-00000"></div>
          <div class="form-group"><label>상호</label><input type="text" id="buyerCompany" placeholder="주식회사 ○○"></div>
          <div class="form-group"><label>성명</label><input type="text" id="buyerName" placeholder="홍길동"></div>
          <div class="form-group"><label>연락처</label><input type="text" id="buyerTel" placeholder="010-0000-0000"></div>
          <div class="form-group"><label>업태</label><input type="text" id="buyerBizType" placeholder="도매 및 소매업"></div>
          <div class="form-group"><label>종목</label><input type="text" id="buyerBizItem" placeholder="전자상거래 소매업"></div>
          <div class="form-group span3"><label>소재지</label><input type="text" id="buyerAddr" placeholder="주소를 입력하세요"></div>
        </div>
        <button class="btn-full" style="width:auto;padding:7px 16px;font-size:12px;margin-top:10px;" onclick="saveCurrentCustomer()">💾 이 고객 저장</button>
      </div>
    </div>

    <!-- 상품 목록 -->
    <div class="card">
      <div class="card-body">
        <div class="section-title">📦 주문 상품 목록</div>
        <table class="product-table">
          <thead><tr>
            <th style="width:110px;">품번</th><th>품명</th>
            <th style="width:60px;">수량</th><th style="width:90px;">소비자가</th>
            <th style="width:70px;">할인율(%)</th><th style="width:90px;">공급가</th>
            <th style="width:90px;">합계</th><th style="width:36px;"></th>
          </tr></thead>
          <tbody id="productBody"></tbody>
        </table>
        <button class="btn-add-row" onclick="addProductRow()">+ 행 추가</button>
      </div>
    </div>

    <!-- 합계 -->
    <div class="summary-box">
      <div class="summary-item"><div class="summary-label">총 수량</div><div class="summary-value" id="totalQty">0</div></div>
      <div class="summary-divider"></div>
      <div class="summary-item"><div class="summary-label">공급가 합계</div><div class="summary-value" id="totalSupply">₩0</div></div>
      <div class="summary-divider"></div>
      <div class="summary-item"><div class="summary-label">합계 금액</div><div class="summary-value" id="totalAmount">₩0</div></div>
    </div>

    <!-- 입금/잔금 -->
    <div class="card">
      <div class="card-body">
        <div class="section-title">💰 입금 / 잔금</div>
        <div class="payment-grid">
          <div class="form-group"><label>입금액</label><input type="number" id="payDeposit" placeholder="0" oninput="calcBalance()"></div>
          <div class="form-group"><label>잔금</label><input type="number" id="payBalance" readonly></div>
          <div class="form-group"><label>인수자</label><input type="text" id="payReceiver" placeholder="(인)"></div>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-outline" onclick="openPreview()">👁 미리보기</button>
      <button class="btn-primary" id="downloadBtn" onclick="downloadExcel()">📥 PDF 다운로드</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════
     모달 1: 미리보기
════════════════════════════════════ -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-lg">
    <div class="modal-header">
      <h3>📋 거래명세서 미리보기</h3>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <div class="modal-body">
      <div class="invoice-preview" id="invoicePreview"></div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closePreview()">닫기</button>
        <button class="btn-primary" onclick="downloadExcel()">📥 PDF 다운로드</button>
      </div>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════
     모달 2: 고객 추가
════════════════════════════════════ -->
<div class="modal-overlay" id="addCustomerModal">
  <div class="modal-sm">
    <div class="modal-header">
      <h3>➕ 새 고객 추가</h3>
      <button class="modal-close" onclick="closeAddCustomer()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid2">
        <div class="form-group"><label>상호 *</label><input type="text" id="nc_company" placeholder="주식회사 ○○"></div>
        <div class="form-group"><label>성명 *</label><input type="text" id="nc_name" placeholder="홍길동"></div>
        <div class="form-group"><label>사업자번호</label><input type="text" id="nc_bizno" placeholder="000-00-00000"></div>
        <div class="form-group"><label>연락처</label><input type="text" id="nc_tel" placeholder="010-0000-0000"></div>
        <div class="form-group"><label>업태</label><input type="text" id="nc_biztype" placeholder="도매 및 소매업"></div>
        <div class="form-group"><label>종목</label><input type="text" id="nc_bizitem" placeholder="전자상거래 소매업"></div>
        <div class="form-group span2"><label>소재지</label><input type="text" id="nc_addr" placeholder="주소"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeAddCustomer()">취소</button>
        <button class="btn-primary" onclick="saveNewCustomer()">💾 저장</button>
      </div>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════
     모달 3: 공급자 수정
════════════════════════════════════ -->
<div class="modal-overlay" id="editSupplierModal">
  <div class="modal-sm">
    <div class="modal-header">
      <h3>✏️ 공급자 정보 수정</h3>
      <button class="modal-close" onclick="closeEditSupplier()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-note">
        ※ 이 화면을 닫거나 새로고침하면 기본값으로 돌아갑니다.<br>
        영구 변경이 필요하면 「기본값으로 저장」을 눌러주세요.
      </div>
      <div class="form-grid2">
        <div class="form-group"><label>상호 *</label><input type="text" id="sp_company"></div>
        <div class="form-group"><label>성명</label><input type="text" id="sp_name"></div>
        <div class="form-group"><label>사업자번호</label><input type="text" id="sp_bizno"></div>
        <div class="form-group"><label>연락처</label><input type="text" id="sp_tel"></div>
        <div class="form-group"><label>업태</label><input type="text" id="sp_biztype"></div>
        <div class="form-group"><label>종목</label><input type="text" id="sp_bizitem"></div>
        <div class="form-group span2"><label>소재지</label><input type="text" id="sp_addr"></div>
        <div class="form-group span2"><label>입금 계좌</label><input type="text" id="sp_bank" placeholder="은행명 계좌번호 예금주"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-danger" onclick="resetSupplier()">🔄 기본값 복원</button>
        <button class="btn-outline" onclick="closeEditSupplier()">취소</button>
        <button class="btn-primary" onclick="applySupplier()">✅ 적용</button>
      </div>
    </div>
  </div>
</div>


<script>
// ══════════════════════════════════════
// 공급자 기본값 (하드코딩)
// ══════════════════════════════════════
const SUPPLIER_DEFAULT = {
  company: '더원컴퍼니',
  name:    '이용아 (인)',
  bizno:   '606-32-83722',
  tel:     '010-9201-7013',
  addr:    '경남 양산시 물금읍 야리 4길 16 애플타워 307호',
  biztype: '도.소매',
  bizitem: '전자상거래',
  bank:    '우리 1002654317447 이용아'
};

// 현재 세션에서 사용할 공급자 (기본값으로 시작)
let SUPPLIER = { ...SUPPLIER_DEFAULT };
let supplierModified = false;

// 공급자 정보 화면 렌더링
function renderSupplier() {
  const el = document.getElementById('supplierDisplay');
  const badge = supplierModified
    ? '<span class="modified-badge">수정됨</span>'
    : '';
  el.innerHTML = `
    <div class="supplier-info">
      <div><strong>상호</strong> ${SUPPLIER.company} ${badge}</div>
      <div><strong>성명</strong> ${SUPPLIER.name}</div>
      <div><strong>사업자번호</strong> ${SUPPLIER.bizno}</div>
      <div><strong>연락처</strong> ${SUPPLIER.tel}</div>
      <div><strong>소재지</strong> <span style="word-break:keep-all;">${SUPPLIER.addr}</span></div>
      <div><strong>업태/종목</strong> ${SUPPLIER.biztype} / ${SUPPLIER.bizitem}</div>
    </div>
    <div class="supplier-bank">
      <strong>입금계좌</strong> ${SUPPLIER.bank}

}

// 수정 팝업 열기 → 현재 값 채우기
function openEditSupplier() {
  document.getElementById('sp_company').value = SUPPLIER.company;
  document.getElementById('sp_name').value    = SUPPLIER.name;
  document.getElementById('sp_bizno').value   = SUPPLIER.bizno;
  document.getElementById('sp_tel').value     = SUPPLIER.tel;
  document.getElementById('sp_addr').value    = SUPPLIER.addr;
  document.getElementById('sp_biztype').value = SUPPLIER.biztype;
  document.getElementById('sp_bizitem').value = SUPPLIER.bizitem;
  document.getElementById('sp_bank').value    = SUPPLIER.bank;

}
function closeEditSupplier() {
  document.getElementById('editSupplierModal').classList.remove('show');
}

// 수정 적용
function applySupplier() {
  const company = document.getElementById('sp_company').value.trim();
  if (!company) { alert('상호를 입력해주세요'); return; }
  SUPPLIER = {
    company,
    name:    document.getElementById('sp_name').value.trim()    || SUPPLIER_DEFAULT.name,
    bizno:   document.getElementById('sp_bizno').value.trim()   || SUPPLIER_DEFAULT.bizno,
    tel:     document.getElementById('sp_tel').value.trim()     || SUPPLIER_DEFAULT.tel,
    addr:    document.getElementById('sp_addr').value.trim()    || SUPPLIER_DEFAULT.addr,
    biztype: document.getElementById('sp_biztype').value.trim() || SUPPLIER_DEFAULT.biztype,
    bizitem: document.getElementById('sp_bizitem').value.trim() || SUPPLIER_DEFAULT.bizitem,
    bank:    document.getElementById('sp_bank').value.trim()    || SUPPLIER_DEFAULT.bank,
  };

  renderSupplier();
  closeEditSupplier();
}

// 기본값 복원
function resetSupplier() {
  if (!confirm('공급자 정보를 기본값으로 복원하시겠습니까?')) return;
  SUPPLIER = { ...SUPPLIER_DEFAULT };
  supplierModified = false;
  renderSupplier();
  closeEditSupplier();
}


// ══════════════════════════════════════
// 고객 목록
// ══════════════════════════════════════
let customers = [];
let selectedId = null;

async function loadCustomers() {
  try {
    const res = await fetch('/forms/customers');
    customers = await res.json();
    renderCustomers(customers);
  } catch(e) { console.error('고객 로드 실패:', e); }
}

function renderCustomers(list) {
  const el = document.getElementById('customerList');
  if (!list.length) { el.innerHTML = '<div class="empty-state">고객이 없습니다</div>'; return; }
  el.innerHTML = list.map(c => `
    <div class="customer-item ${c.id === selectedId ? 'selected' : ''}" onclick="selectCustomer('${c.id}')">
      <div>
        <div class="customer-name">${c.company || c.name}</div>
        <div class="customer-sub">${c.company ? c.name + ' ' : ''}${c.tel || ''}</div>
      </div>
      <span class="del-btn" onclick="event.stopPropagation();delCustomer('${c.id}')">✕</span>
    </div>
  `).join('');
}

function searchCustomers() {
  const q = document.getElementById('customerSearch').value.toLowerCase();
  renderCustomers(customers.filter(c =>
    (c.company||'').toLowerCase().includes(q) || (c.name||'').toLowerCase().includes(q)
  ));
}

function selectCustomer(id) {
  selectedId = id;
  const c = customers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('buyerBizNo').value   = c.bizno   || '';
  document.getElementById('buyerCompany').value = c.company || '';
  document.getElementById('buyerName').value    = c.name    || '';
  document.getElementById('buyerTel').value     = c.tel     || '';
  document.getElementById('buyerAddr').value    = c.addr    || '';
  document.getElementById('buyerBizType').value = c.biztype || '';
  document.getElementById('buyerBizItem').value = c.bizitem || '';
  renderCustomers(customers);
}

async function delCustomer(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await fetch('/forms/customers/' + id, { method: 'DELETE' });
  customers = customers.filter(c => c.id !== id);
  if (selectedId === id) selectedId = null;
  renderCustomers(customers);
}

function openAddCustomer() {
  ['nc_company','nc_name','nc_bizno','nc_tel','nc_biztype','nc_bizitem','nc_addr']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('addCustomerModal').classList.add('show');
}
function closeAddCustomer() { document.getElementById('addCustomerModal').classList.remove('show'); }

async function saveNewCustomer() {
  const company = document.getElementById('nc_company').value.trim();
  const name    = document.getElementById('nc_name').value.trim();
  if (!company && !name) { alert('상호 또는 성명을 입력해주세요'); return; }
  const body = { company, name,
    bizno:   document.getElementById('nc_bizno').value.trim(),
    tel:     document.getElementById('nc_tel').value.trim(),
    biztype: document.getElementById('nc_biztype').value.trim(),
    bizitem: document.getElementById('nc_bizitem').value.trim(),
    addr:    document.getElementById('nc_addr').value.trim()
  };
  const res  = await fetch('/forms/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const saved = await res.json();
  customers.push(saved);
  renderCustomers(customers);
  closeAddCustomer();
}

async function saveCurrentCustomer() {
  const company = document.getElementById('buyerCompany').value.trim();
  const name    = document.getElementById('buyerName').value.trim();
  if (!company && !name) { alert('상호 또는 성명을 입력해주세요'); return; }

    addr:    document.getElementById('buyerAddr').value.trim()
  };
  const res  = await fetch('/forms/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const saved = await res.json();

  renderCustomers(customers);

// ══════════════════════════════════════
// 상품 테이블
// ══════════════════════════════════════
let rowIdx = 0;

function addProductRow(data = {}) {
  rowIdx++;
  const id = rowIdx;
  const tr = document.createElement('tr');
  tr.id = 'row_' + id;
  tr.innerHTML = `
    <td><input type="text" placeholder="품번" value="${data.code||''}" onchange="calcRow(${id})"></td>
    <td><input type="text" placeholder="품명" style="text-align:left;" value="${data.name||''}"></td>
    <td><input type="number" placeholder="0" value="${data.qty||''}" min="0" oninput="calcRow(${id})"></td>
    <td><input type="number" placeholder="0" value="${data.price||''}" min="0" oninput="calcRow(${id})"></td>
    <td><input type="number" placeholder="0" value="${data.disc||''}" min="0" max="100" oninput="calcRow(${id})"></td>
    <td class="calc-cell" id="supply_${id}">-</td>
    <td class="calc-cell" id="total_${id}">-</td>
    <td><button onclick="removeRow(${id})" style="background:none;border:none;color:#ff4444;cursor:pointer;font-size:15px;padding:4px;">✕</button></td>
  `;
  document.getElementById('productBody').appendChild(tr);
  if (data.qty) calcRow(id);
}

function calcRow(id) {
  const tr = document.getElementById('row_' + id);
  if (!tr) return;
  const inp = tr.querySelectorAll('input');
  const qty = parseFloat(inp[2].value)||0, price = parseFloat(inp[3].value)||0, disc = parseFloat(inp[4].value)||0;
  const supply = price * (1 - disc/100), total = supply * qty;
  document.getElementById('supply_'+id).textContent = supply ? Math.round(supply).toLocaleString() : '-';
  document.getElementById('total_' +id).textContent = total  ? Math.round(total).toLocaleString()  : '-';
  calcSummary();
}
function removeRow(id) { document.getElementById('row_'+id)?.remove(); calcSummary(); }

function calcSummary() {
  let qty=0, amt=0;
  document.querySelectorAll('#productBody tr').forEach(tr => {
    const inp = tr.querySelectorAll('input');
    const q = parseFloat(inp[2].value)||0, p = parseFloat(inp[3].value)||0, d = parseFloat(inp[4].value)||0;
    qty += q; amt += q * p * (1 - d/100);
  });
  document.getElementById('totalQty').textContent    = qty.toLocaleString();
  document.getElementById('totalSupply').textContent = '₩' + Math.round(amt).toLocaleString();
  document.getElementById('totalAmount').textContent = '₩' + Math.round(amt).toLocaleString();
  calcBalance();
}

function calcBalance() {
  const total   = getTotalAmt();
  const deposit = parseFloat(document.getElementById('payDeposit').value)||0;
  document.getElementById('payBalance').value = Math.max(0, total - deposit).toLocaleString();
}

function getTotalAmt() {
  let t = 0;
  document.querySelectorAll('#productBody tr').forEach(tr => {
    const inp = tr.querySelectorAll('input');
    t += (parseFloat(inp[2].value)||0) * (parseFloat(inp[3].value)||0) * (1 - (parseFloat(inp[4].value)||0)/100);
  });
  return Math.round(t);
}

function getProducts() {
  const rows = [];
  document.querySelectorAll('#productBody tr').forEach(tr => {
    const inp = tr.querySelectorAll('input');
    const code=inp[0].value.trim(), name=inp[1].value.trim();
    const qty=parseFloat(inp[2].value)||0, price=parseFloat(inp[3].value)||0, disc=parseFloat(inp[4].value)||0;
    if (code || name || qty) rows.push({ code, name, qty, price, disc,
      supply: Math.round(price*(1-disc/100)),
      total:  Math.round(price*(1-disc/100)*qty)
    });
  });
  return rows;
}

function buildData() {
  const products = getProducts(), totalAmount = getTotalAmt();
  const deposit  = parseFloat(document.getElementById('payDeposit').value)||0;
  return {
    date:     document.getElementById('tradeDate').value,
    memo:     document.getElementById('tradeMemo').value,
    buyer: {
      bizno:   document.getElementById('buyerBizNo').value,
      company: document.getElementById('buyerCompany').value,
      name:    document.getElementById('buyerName').value,
      tel:     document.getElementById('buyerTel').value,
      addr:    document.getElementById('buyerAddr').value,
      biztype: document.getElementById('buyerBizType').value,
      bizitem: document.getElementById('buyerBizItem').value,
    },
    supplier: SUPPLIER,   // ← 현재 세션 공급자 사용
    products, totalAmount,
    deposit, balance: Math.max(0, totalAmount - deposit),
    receiver: document.getElementById('payReceiver').value
  };
}

    <div class="inv-party-row"><div class="inv-lbl">소재지</div><div class="inv-val">${p.addr||''}</div></div>

      <div class="inv-tsub">₩ ${d.totalAmount.toLocaleString()}</div>

      <table><thead><tr>
        <th>품 번</th><th>품 명</th><th>수량</th><th>소비자가</th><th>할인율</th><th>공급가</th><th>합계</th>

function closePreview() { document.getElementById('previewModal').classList.remove('show'); }

async function downloadExcel() {
  const d = buildData();
  if (!d.products.length)                { alert('❌ 상품을 1개 이상 입력해주세요'); return; }
  if (!d.buyer.company && !d.buyer.name) { alert('❌ 수요자 정보를 입력해주세요'); return; }
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true; btn.textContent = '⏳ PDF 생성 중...';
  try {
    const res    = await fetch('/generate_invoice', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d)
    });
    const result = await res.json();
    if (result.success) {
      const a = document.createElement('a');
      a.href = '/download_invoice/' + encodeURIComponent(result.filename);
      a.download = result.filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else {
      alert('❌ 생성 실패: ' + result.error);
    }
  } catch(e) { alert('❌ 오류: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '📥 PDF 다운로드'; }
}
